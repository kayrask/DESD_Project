services:
  db:
    image: postgres:16-alpine
    container_name: desd-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: desd
      POSTGRES_USER: desd_user
      POSTGRES_PASSWORD: desd_password
    ports:
      - "5432:5432"
    volumes:
      - desd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desd_user -d desd"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    container_name: desd-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend-fastapi:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_db &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  web:
    image: nginx:1.25-alpine
    container_name: desd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend-fastapi/staticfiles:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  desd_postgres_data:
