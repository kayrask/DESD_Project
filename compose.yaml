services:
  db:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: desd-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: desd
      POSTGRES_USER: desd_user
      POSTGRES_PASSWORD: desd_password
    ports:
      - "5432:5432"
    volumes:
      - desd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desd_user -d desd"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: desd-redis
    restart: unless-stopped
    command: ["redis-server", "--ignore-warnings", "ARM64-COW-BUG"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: desd-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend-fastapi:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_db &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 desd_backend.asgi:application"

  celery_worker:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: desd-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend-fastapi:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A desd_backend worker --loglevel=info --concurrency=2

  celery_beat:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: desd-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend-fastapi:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A desd_backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  web:
    image: nginx:1.25-alpine
    platform: linux/amd64
    container_name: desd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend-fastapi/staticfiles:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  desd_postgres_data:
