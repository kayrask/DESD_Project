services:
  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    container_name: desd-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend-fastapi:/app
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: desd-frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
