{% extends 'base.html' %}
{% block title %}404 Page Not Found – DESD{% endblock %}

{% block content %}
<div class="container py-5 text-center" style="max-width:520px;margin:auto">
  <i class="bi bi-map-fill" style="font-size:5rem;color:var(--brand-green,#4caf50);opacity:.7"></i>
  <h2 class="mt-4 fw-bold">Page Not Found</h2>
  <p class="text-muted mt-2 mb-4">
    The page you're looking for doesn't exist or may have moved.<br>
    Let's get you back on track.
  </p>

  <div class="d-flex flex-wrap justify-content-center gap-3">
    <a href="{% url 'home' %}" class="btn btn-brand px-4">
      <i class="bi bi-house-fill me-2"></i>Go to Home
    </a>
    <a href="{% url 'marketplace' %}" class="btn btn-outline-success px-4">
      <i class="bi bi-shop me-2"></i>Browse Marketplace
    </a>
  </div>

  <p class="text-muted mt-5" style="font-size:.8rem">Error 404</p>
</div>
{% endblock %}
